name: Bug report
description: Report reproducible AI Keeper behavior without sharing private chat content.
title: "[Bug]: "
labels: [bug, triage]
type: bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Keep the report metadata-only.
        Do not paste prompts, assistant messages, raw transcripts, API keys, or local database files.
  - type: input
    id: version
    attributes:
      label: AI Keeper version
      description: Run `aikeeper --version` or use the dashboard version.
      placeholder: v0.24.0
    validations:
      required: true
  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - Release archive
        - Homebrew formula
        - Local checkout
        - Other
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15, macOS 14, Linux, Windows
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: What happened?
      description: Describe the behavior and the expected behavior. Keep examples metadata-only.
      placeholder: The dashboard showed... I expected...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use commands, pages, timestamps, and token counts. Do not include raw chat content.
      placeholder: |
        1. Run ...
        2. Open ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Metadata-only logs
      description: Paste bounded logs only after removing secrets and private content.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I did not include prompts, assistant messages, raw transcripts, API keys, or local database files.
          required: true
        - label: This report is metadata-only.
          required: true
