name: Feature request
description: Suggest an AI Keeper improvement while preserving the local-only metadata-only contract.
title: "[Feature]: "
labels: [enhancement, triage]
type: feature
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Keep the request metadata-only.
        Do not paste prompts, assistant messages, raw transcripts, API keys, or local database files.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow, decision, or operational pain should this improve?
      placeholder: I want to understand...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior or UI.
      placeholder: AI Keeper should...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Codex ingest
        - Dashboard
        - Budgets and cost
        - Distribution and install
        - Privacy and security
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Mention workarounds or tradeoffs.
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I did not include prompts, assistant messages, raw transcripts, API keys, or local database files.
          required: true
        - label: This request preserves the local-only metadata-only contract.
          required: true
