name: Security contact
description: Ask a security-process question. Do not report vulnerabilities in a public issue.
title: "[Security]: "
labels: [security, triage]
type: task
body:
  - type: markdown
    attributes:
      value: |
        Do not report vulnerabilities in a public issue.
        Use the private disclosure path in SECURITY.md for vulnerabilities.
        Keep this issue metadata-only and do not paste prompts, assistant messages,
        raw transcripts, API keys, or local database files.
  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - Private vulnerability disclosure process
        - Privacy model question
        - Release verification question
        - Security hardening suggestion
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Question
      description: Ask the process or hardening question without disclosing sensitive details.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I did not include prompts, assistant messages, raw transcripts, API keys, or local database files.
          required: true
        - label: I am not reporting an unpatched vulnerability in this public issue.
          required: true
