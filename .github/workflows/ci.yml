name: CI

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-package:
    name: Test, audit, and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv

      - name: Run tests
        run: uv run pytest -q

      - name: Privacy audit
        run: uv run aikeeper audit privacy --json

      - name: Distribution audit
        run: uv run aikeeper audit distribution --json

      - name: Build package
        run: bash scripts/package.sh --version ci-${{ github.sha }} --output-dir dist

      - name: Generate release verification materials
        run: bash scripts/sign-release.sh --dist-dir dist --signer none

      - name: Verify checksums
        run: cd dist && shasum -a 256 -c CHECKSUMS.txt

      - name: Validate Homebrew formulas
        run: |
          ruby -c dist/homebrew/aikeeper.rb
          ruby -c dist/homebrew-tap/Formula/aikeeper.rb
