name: Public Release Gate

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to verify, for example v0.22.0.
        required: true
        type: string

permissions:
  contents: read
  actions: read

jobs:
  public-release-gate:
    name: Public release gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv

      - name: Run public release gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/public-release-gate.sh --version "${{ inputs.version }}" --output-dir dist --online
