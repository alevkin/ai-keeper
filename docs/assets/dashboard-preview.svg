<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="720" viewBox="0 0 1040 720" role="img" aria-labelledby="title desc">
  <title id="title">AI Keeper dashboard preview</title>
  <desc id="desc">A product preview of the AI Keeper Task Economics dashboard with current task cost, projected spend, active rate, cost drivers, and next best move.</desc>
  <defs>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <linearGradient id="teal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#5aa99a"/>
      <stop offset="1" stop-color="#157465"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" x2="1">
      <stop offset="0" stop-color="#e4b45f"/>
      <stop offset="1" stop-color="#9a6415"/>
    </linearGradient>
  </defs>
  <rect width="1040" height="720" rx="18" fill="#f5f7f4"/>
  <rect x="36" y="36" width="968" height="648" rx="16" fill="#ffffff" stroke="#d8e1dc" filter="url(#shadow)"/>
  <rect x="36" y="36" width="968" height="64" rx="16" fill="#ffffff" stroke="#d8e1dc"/>
  <circle cx="74" cy="68" r="13" fill="url(#teal)"/>
  <path d="M67 68h14M74 61v14" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round"/>
  <text x="104" y="75" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" font-weight="760" fill="#121a19">AI Keeper</text>
  <rect x="612" y="51" width="88" height="34" rx="8" fill="#edf3ef"/>
  <text x="634" y="73" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="760" fill="#121a19">Efficiency</text>
  <text x="724" y="73" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="720" fill="#66736f">Usage</text>
  <text x="786" y="73" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="720" fill="#66736f">Models</text>
  <text x="858" y="73" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="720" fill="#66736f">Budgets</text>

  <g transform="translate(78 140)">
    <text x="0" y="0" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="820" fill="#0e5148">EFFICIENCY</text>
    <text x="0" y="52" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="46" font-weight="820" fill="#121a19">Task Economics</text>
    <text x="0" y="86" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="17" fill="#66736f">Manage agent work by cost per useful outcome.</text>
  </g>

  <g transform="translate(78 252)">
    <rect width="596" height="256" rx="12" fill="#ffffff" stroke="#b9ddd4"/>
    <rect width="596" height="70" rx="12" fill="#f7fbf9" stroke="#d8e1dc"/>
    <text x="24" y="30" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="780" fill="#66736f">CURRENT USEFUL OUTCOME</text>
    <text x="24" y="58" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" font-weight="800" fill="#121a19">AK-018 release polish</text>
    <rect x="440" y="22" width="128" height="28" rx="14" fill="#fff5df" stroke="#edd5a8"/>
    <text x="464" y="41" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="780" fill="#9a6415">Above usual</text>

    <g transform="translate(24 104)">
      <text x="0" y="0" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="780" fill="#66736f">SPENT SO FAR</text>
      <text x="0" y="42" font-family="SFMono-Regular,Consolas,monospace" font-size="34" font-weight="800" fill="#0e5148">$18.42</text>
      <text x="0" y="72" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" fill="#66736f">24.8M tokens</text>
    </g>
    <g transform="translate(214 104)">
      <text x="0" y="0" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="780" fill="#66736f">PROJECTED NEXT 30M</text>
      <text x="0" y="42" font-family="SFMono-Regular,Consolas,monospace" font-size="34" font-weight="800" fill="#121a19">$22.10</text>
      <text x="0" y="72" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" fill="#66736f">+$3.68 if rate holds</text>
    </g>
    <g transform="translate(428 104)">
      <text x="0" y="0" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="780" fill="#66736f">USUAL TASK</text>
      <text x="0" y="42" font-family="SFMono-Regular,Consolas,monospace" font-size="34" font-weight="800" fill="#121a19">$14.90</text>
      <text x="0" y="72" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" fill="#9a6415">+23.6% vs baseline</text>
    </g>
    <text x="24" y="218" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="760" fill="#66736f">Spent vs usual task</text>
    <text x="520" y="218" text-anchor="end" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="800" fill="#9a6415">+23.6%</text>
    <rect x="24" y="232" width="548" height="12" rx="6" fill="#e7eeeb" stroke="#d7e2dd"/>
    <rect x="24" y="232" width="408" height="12" rx="6" fill="url(#amber)"/>
  </g>

  <g transform="translate(704 252)">
    <rect width="236" height="256" rx="12" fill="#ffffff" stroke="#d8e1dc"/>
    <rect width="236" height="56" rx="12" fill="#f8faf7" stroke="#d8e1dc"/>
    <text x="20" y="35" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" font-weight="800" fill="#121a19">Next best move</text>
    <text x="20" y="90" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="21" font-weight="800" fill="#121a19">Narrow the next turn</text>
    <text x="20" y="122" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" fill="#66736f">Live burn is high. Keep the next</text>
    <text x="20" y="144" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" fill="#66736f">prompt scoped to one file, one</text>
    <text x="20" y="166" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" fill="#66736f">failing test, or one decision.</text>
    <rect x="20" y="184" width="94" height="28" rx="14" fill="#edf3ef" stroke="#d8e1dc"/>
    <text x="33" y="203" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="760" fill="#121a19">Run tests first</text>
    <rect x="20" y="222" width="124" height="28" rx="14" fill="#edf3ef" stroke="#d8e1dc"/>
    <text x="33" y="241" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="760" fill="#121a19">Split remaining work</text>
  </g>

  <g transform="translate(78 534)">
    <rect width="284" height="98" rx="12" fill="#ffffff" stroke="#d8e1dc"/>
    <text x="20" y="32" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="780" fill="#66736f">Active rate</text>
    <text x="20" y="70" font-family="SFMono-Regular,Consolas,monospace" font-size="28" font-weight="800" fill="#121a19">82.6K/min</text>
    <rect x="166" y="40" width="14" height="36" rx="7" fill="#5d9d90"/>
    <rect x="188" y="28" width="14" height="48" rx="7" fill="#157465"/>
    <rect x="210" y="50" width="14" height="26" rx="7" fill="#5d9d90"/>
    <rect x="232" y="20" width="14" height="56" rx="7" fill="#157465"/>
  </g>
  <g transform="translate(384 534)">
    <rect width="286" height="98" rx="12" fill="#ffffff" stroke="#d8e1dc"/>
    <text x="20" y="32" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="780" fill="#66736f">COST DRIVERS</text>
    <circle cx="24" cy="58" r="5" fill="#9a6415"/>
    <text x="40" y="63" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="760" fill="#121a19">Turn volume</text>
    <text x="184" y="63" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="800" fill="#0e5148">18 turns</text>
  </g>
  <g transform="translate(704 534)">
    <rect width="236" height="98" rx="12" fill="#ffffff" stroke="#d8e1dc"/>
    <text x="20" y="32" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="780" fill="#66736f">This week</text>
    <text x="20" y="70" font-family="SFMono-Regular,Consolas,monospace" font-size="28" font-weight="800" fill="#121a19">$64.80</text>
  </g>
</svg>
