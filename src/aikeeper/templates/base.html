<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AI Keeper{% endblock %}</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-main">
        <a class="brand" href="/">AI Keeper</a>
        {% if version %}
        <span class="version-badge">{{ version.label }}</span>
        {% endif %}
      </div>
      <nav class="topnav">
        <a href="/">Overview</a>
        <span class="daemon-status"><span aria-hidden="true"></span> local daemon</span>
      </nav>
    </header>
    <main class="shell">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
