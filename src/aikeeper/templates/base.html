<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AI Keeper{% endblock %}</title>
    {% set asset_version = version.label if version and version.label else (version.commit if version else "dev") %}
    <link rel="stylesheet" href="/static/styles.css?v={{ asset_version }}">
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-main">
        <a class="brand" href="/">AI Keeper</a>
        {% if version %}
        <span class="version-badge">{{ version.label }}</span>
        {% endif %}
      </div>
      <nav class="topnav">
        <a href="/" {% if active_page == "command" %}aria-current="page"{% endif %}>Efficiency</a>
        <a href="/usage" {% if active_page == "usage" %}aria-current="page"{% endif %}>Usage</a>
        <a href="/models" {% if active_page == "models" %}aria-current="page"{% endif %}>Models</a>
        <a href="/budgets" {% if active_page == "budgets" %}aria-current="page"{% endif %}>Budgets</a>
        <a href="/health" {% if active_page == "health" %}aria-current="page"{% endif %}>Health</a>
        <a href="/diagnostics" {% if active_page == "diagnostics" %}aria-current="page"{% endif %}>Diagnostics</a>
        <a href="/system" {% if active_page == "system" %}aria-current="page"{% endif %}>System</a>
        <span class="daemon-status"><span aria-hidden="true"></span> local daemon</span>
      </nav>
    </header>
    <main class="shell">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
